# ============================================================================
# ~/.config/helix/languages.toml
# 语言配置
# ============================================================================

# ============================================================================
# Go
# ============================================================================

[[language]]
name = "go"
file-types = ["go"]
roots = ["go.mod"]
language-servers = ["gopls"]
indent = { tab-width = 4, unit = "\t" }
auto-format = true

[language-server.gopls]
command = "gopls"

# ============================================================================
# Rust
# ============================================================================

[[language]]
name = "rust"
file-types = ["rs"]
roots = ["Cargo.toml"]
language-servers = ["rust-analyzer"]
indent = { tab-width = 4, unit = "    " }
auto-format = true

[language-server.rust-analyzer]
command = "rust-analyzer"

# ============================================================================
# TypeScript / TSX / JavaScript / JSX
# ============================================================================

[[language]]
name = "typescript"
file-types = ["ts", "mts", "cts"]
roots = ["package.json"]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[[language]]
name = "tsx"
file-types = ["tsx"]
roots = ["package.json"]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[[language]]
name = "javascript"
file-types = ["js", "mjs", "cjs"]
roots = ["package.json"]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[[language]]
name = "jsx"
file-types = ["jsx"]
roots = ["package.json"]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

# ============================================================================
# Vue
# ============================================================================

[[language]]
name = "vue"
file-types = ["vue"]
roots = ["package.json"]
language-servers = ["vue-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[language-server.vue-language-server]
command = "vue-language-server"
args = ["--stdio"]

# ============================================================================
# Python
# ============================================================================

[[language]]
name = "python"
file-types = ["py", "pyi"]
roots = ["pyproject.toml"]
language-servers = ["pylsp"]
indent = { tab-width = 4, unit = "    " }
auto-format = true

[language-server.pylsp]
command = "pylsp"

# ============================================================================
# C / C++
# ============================================================================

[[language]]
name = "cpp"
file-types = ["cpp", "cc", "cxx", "hpp", "h"]
roots = [".git", "CMakeLists.txt"]
language-servers = ["clangd"]
indent = { tab-width = 4, unit = "    " }
auto-format = true

[[language]]
name = "c"
file-types = ["c", "h"]
roots = [".git", "CMakeLists.txt"]
language-servers = ["clangd"]
indent = { tab-width = 4, unit = "    " }
auto-format = true

[language-server.clangd]
command = "clangd"

# ============================================================================
# Java
# ============================================================================

[[language]]
name = "java"
file-types = ["java"]
roots = ["pom.xml"]
language-servers = ["jdtls"]
indent = { tab-width = 4, unit = "    " }
auto-format = true

[language-server.jdtls]
command = "jdtls"

# ============================================================================
# Nix
# ============================================================================

[[language]]
name = "nix"
file-types = ["nix"]
roots = ["flake.nix"]
language-servers = ["nil"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[language-server.nil]
command = "nil"

# ============================================================================
# JSON / YAML / TOML
# ============================================================================

[[language]]
name = "json"
file-types = ["json"]
language-servers = ["vscode-json-language-server"]
auto-format = true

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[[language]]
name = "yaml"
file-types = ["yaml", "yml"]
language-servers = ["yaml-language-server"]
indent = { tab-width = 2, unit = "  " }

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[[language]]
name = "toml"
file-types = ["toml"]
language-servers = ["taplo"]
indent = { tab-width = 2, unit = "  " }

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]
